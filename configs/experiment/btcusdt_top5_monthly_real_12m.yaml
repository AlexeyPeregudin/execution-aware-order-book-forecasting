# 12-month real-data monthly run: Binance-futures BTCUSDT, first-of-month
# 2025-07-01 .. 2026-06-01 (Improvements spec §3). Expanding 6/1/1 walk-forward
# gives five test months (2026-02 .. 2026-06).
# Source: Tardis book_snapshot_5 daily archives under
#   data/raw/binance-futures/book_snapshot_5/{YYYY}/{MM}/{DD}/BTCUSDT.csv.gz

data:
  venue: binance
  symbols: ["BTCUSDT"]
  top_k: 5
  raw_dir: data/raw
  processed_dir: data/processed
  artefact_dir: artefacts
  monthly_snapshot:
    enabled: true
    day_of_month: 1
    dates:
      - "2025-07-01"
      - "2025-08-01"
      - "2025-09-01"
      - "2025-10-01"
      - "2025-11-01"
      - "2025-12-01"
      - "2026-01-01"
      - "2026-02-01"
      - "2026-03-01"
      - "2026-04-01"
      - "2026-05-01"
      - "2026-06-01"

sampling:
  mode: event_time
  horizons_events: [10, 50, 200]
  feature_lookbacks_events: [10, 50, 200]
  event_stride: 10

ingestion:
  mode: tardis_archive
  source_root: data/raw/binance-futures/book_snapshot_5
  file_format: csv.gz
  schema_version: "1"
  overwrite: false
  manifest_path: data_manifest/sources_real_12m.yml
  checksums_path: data_manifest/checksums_real_12m.yml

normalisation:
  unknown_event_type_policy: flag
  venue_adapter: tardis_book_snapshot

orderbook:
  mode: snapshot
  align_trades: false

features:
  include_basic_microstructure: true
  include_best_level_ofi: true
  include_multilevel_imbalance: true
  include_raw_levels: true
  include_regime_features: true
  realised_vol_lookbacks_events: [50, 200, 1000]
  regime_windows_events:
    volatility: 1000
    spread: 1000
    liquidity: 1000
  regime_quantiles:
    low: 0.33
    high: 0.67

labels:
  direction_threshold_mode: train_median_relative_spread
  direction_threshold_alpha: 0.5
  quantiles: [0.05, 0.50, 0.95]
  include_markout_targets: true
  include_adverse_selection_targets: true

splits:
  mode: expanding_monthly_snapshot
  min_train_months: 6
  validation_months: 1
  test_months: 1
  step_months: 1
  embargo_events: 200
  freeze_global_label_thresholds_on_first_train: true
  freeze_global_regime_thresholds_on_first_train: true

datasets:
  sequence_length: 100
  exclude_crossed: true
  drop_incomplete_feature_rows: true

models:
  run:
    - no_change
    - imbalance_rule
    - logistic_regression
    - ridge_regression
    - lightgbm
    - tcn_small
    - tcn_exec_multitask

# Latent state-space context module (Improvements spec §7); paired ablations are
# driven by the experiment matrix, not by flipping this flag mid-run.
latent_state:
  enabled: true
  model_type: linear_gaussian
  state_dim: 4
  observation_columns:
    - imbalance_l1
    - imbalance_lK
    - ofi_50
    - return_lag_10
    - realised_vol_200
    - relative_spread
    - regime_depth
  fit_scope: fold_train
  reset_each_monthly_day: true
  append_to_model_context: true
  append_to_policy_state: true

backtest:
  run_taker_sanity: true
  run_market_making: true
  horizon: 50
  threshold_grid: [0.0, 0.00001, 0.00002, 0.00005, 0.0001]
  fee_bps: 5.0
  fee_bps_taker: 5.0
  fee_bps_maker: 0.0
  latency_events: 1
  max_position: 1.0
  max_inventory: 1.0
  trade_size: 1.0

market_making:
  enabled: true
  action_space: quote_sides_only
  quote_distance_ticks: [0, 1]
  quote_size: 1.0
  fill_model: queue_aware_partial
  decision_interval: 200
  inventory_penalties: [0.0, 0.001, 0.01, 0.05]
  uncertainty_threshold_grid: [0.0, 0.5, 1.0, 1.5, 2.0]
  policies:
    - no_quote
    - naive_symmetric_mm
    - inventory_skewed_mm
    - forecast_aware_mm
    - uncertainty_aware_mm
    - control_quote_optimizer
  queue_fill:
    quote_levels: [1, 2]
    queue_position: back
    depletion_fill_fraction_grid: [0.25, 0.50, 0.75]
    select_depletion_fraction_on_validation: true
    aggregate_partial_fills: true
    full_cross_fill: true
  control:
    enabled: true
    action_levels: [1, 2]
    # trimmed grid (6 combos) to keep the per-fold validation search tractable
    lambda_inv_grid: [0.01]
    lambda_turn_grid: [0.001]
    lambda_adv_grid: [0.10, 0.25, 0.50]
    lambda_unc_grid: [0.0, 0.05]
    lambda_act_grid: [0.0]
    select_params_on_validation: true
    min_fills_per_test_month: 25
    fill_probability_model: lightgbm

robustness:
  block_bootstrap:
    enabled: true
    n_bootstrap: 300
    block_size_events: 1000
    confidence_level: 0.95

random_seed: 42
