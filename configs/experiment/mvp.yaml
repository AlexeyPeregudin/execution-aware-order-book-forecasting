# MVP experiment configuration
# Single source of truth for one end-to-end run on BTCUSDT sample data.
# Update start_date / end_date to match the data you have downloaded.

data:
  venue: binance
  symbols: ["BTCUSDT"]
  start_date: "2024-01-01"
  end_date: "2024-03-31"
  top_k: 10
  raw_dir: data/raw
  processed_dir: data/processed
  artefact_dir: artefacts

sampling:
  mode: event_time
  horizons_events: [10, 50, 200]
  feature_lookbacks_events: [10, 50, 200]

ingestion:
  # 'synthetic' lets a clean checkout run end-to-end with no external data.
  # Switch to 'url_archive' (set base_url/url_template) or 'local_archive'
  # (set source_root) to ingest real Binance public archives.
  mode: synthetic
  file_format: csv
  schema_version: "1"
  overwrite: false
  manifest_path: data_manifest/sources.yml
  checksums_path: data_manifest/checksums.yml
  synthetic:
    num_days: 2
    rows_per_day: 2000
    seed: 7
  # Example for real Binance daily depth archives:
  # mode: url_archive
  # base_url: https://data.binance.vision/data/spot/daily/depth
  # url_template: "{base_url}/{symbol}/{symbol}-depth-{date}.zip"
  # file_format: zip

normalisation:
  # 'flag' keeps unknown event types with a quality flag; 'reject' drops them.
  unknown_event_type_policy: flag
  venue_adapter: null  # null auto-selects by data.venue

orderbook:
  # 'auto' picks snapshot vs replay per partition; 'snapshot'/'replay' force it.
  mode: auto
  align_trades: false

labels:
  direction_threshold_mode: train_median_relative_spread
  direction_threshold_alpha: 0.5

splits:
  train_fraction: 0.6
  validation_fraction: 0.2
  test_fraction: 0.2
  embargo_events: 200

datasets:
  sequence_length: 100      # TCN window length
  exclude_crossed: true     # drop crossed-book rows from model-ready datasets
  drop_incomplete_feature_rows: true

features:
  include_basic_microstructure: true
  include_best_level_ofi: true
  include_multilevel_imbalance: true
  realised_vol_lookbacks_events: [50, 200]
  include_raw_levels: false  # set true to carry raw top-K levels for the TCN

models:
  run:
    - no_change
    - imbalance_rule
    - logistic_regression
    - ridge_regression
    - lightgbm
    - tcn_small

backtest:
  horizon: 50
  threshold_grid: [0.0, 0.00001, 0.00002, 0.00005, 0.0001]
  fee_bps: 5.0
  latency_events: 1
  max_position: 1.0
  trade_size: 1.0

random_seed: 42
