# Real-data monthly run: Binance-futures BTCUSDT, first-of-month 2026-01..2026-06.
# Source: Tardis book_snapshot_5 daily archives under
#   data/raw/binance-futures/book_snapshot_5/{YYYY}/{MM}/{DD}/BTCUSDT.csv.gz
# Fixed split: 4 months train (Jan-Apr), 1 validation (May), 1 test (Jun).

data:
  venue: binance
  symbols: ["BTCUSDT"]
  top_k: 5
  raw_dir: data/raw
  processed_dir: data/processed
  artefact_dir: artefacts
  monthly_snapshot:
    enabled: true
    day_of_month: 1
    dates:
      - "2026-01-01"
      - "2026-02-01"
      - "2026-03-01"
      - "2026-04-01"
      - "2026-05-01"
      - "2026-06-01"

sampling:
  mode: event_time
  horizons_events: [10, 50, 200]
  feature_lookbacks_events: [10, 50, 200]
  # book_snapshot_5 is recorded on every micro-update (~8M rows/6 days); keep
  # every 10th snapshot so the event stream is a sensible forecasting granularity
  # and the deep models / replay stay tractable on a home PC.
  event_stride: 10

ingestion:
  mode: tardis_archive
  source_root: data/raw/binance-futures/book_snapshot_5
  file_format: csv.gz
  schema_version: "1"
  overwrite: false
  manifest_path: data_manifest/sources_real.yml
  checksums_path: data_manifest/checksums_real.yml

normalisation:
  unknown_event_type_policy: flag
  venue_adapter: tardis_book_snapshot

orderbook:
  mode: snapshot          # each Tardis row is a full top-5 snapshot
  align_trades: false

features:
  include_basic_microstructure: true
  include_best_level_ofi: true
  include_multilevel_imbalance: true
  include_raw_levels: true
  include_regime_features: true
  realised_vol_lookbacks_events: [50, 200, 1000]
  regime_windows_events:
    volatility: 1000
    spread: 1000
    liquidity: 1000
  regime_quantiles:
    low: 0.33
    high: 0.67

labels:
  direction_threshold_mode: train_median_relative_spread
  direction_threshold_alpha: 0.5
  quantiles: [0.05, 0.50, 0.95]
  include_markout_targets: true
  include_adverse_selection_targets: true

splits:
  mode: fixed_monthly_snapshot
  min_train_months: 4
  validation_months: 1
  test_months: 1
  embargo_events: 200
  train_dates: ["2026-01-01", "2026-02-01", "2026-03-01", "2026-04-01"]
  validation_dates: ["2026-05-01"]
  test_dates: ["2026-06-01"]

datasets:
  sequence_length: 100
  exclude_crossed: true
  drop_incomplete_feature_rows: true

models:
  run:
    - no_change
    - imbalance_rule
    - logistic_regression
    - ridge_regression
    - lightgbm
    - tcn_small
    - tcn_exec_multitask

backtest:
  run_taker_sanity: true
  run_market_making: true
  horizon: 50
  threshold_grid: [0.0, 0.00001, 0.00002, 0.00005, 0.0001]
  fee_bps: 5.0
  fee_bps_taker: 5.0
  fee_bps_maker: 0.0
  latency_events: 1
  max_position: 1.0
  max_inventory: 1.0
  trade_size: 1.0

market_making:
  enabled: true
  action_space: quote_sides_only
  quote_distance_ticks: [0, 1]
  quote_size: 1.0
  fill_model: conservative_touch_or_mid_cross
  decision_interval: 200        # requote every 200 events (keeps the replay tractable)
  inventory_penalties: [0.0, 0.001, 0.01, 0.05]
  uncertainty_threshold_grid: [0.0, 0.5, 1.0, 1.5, 2.0]
  policies:
    - naive_symmetric_mm
    - inventory_skewed_mm
    - forecast_aware_mm
    - uncertainty_aware_mm
    - contextual_bandit_mm

robustness:
  block_bootstrap:
    enabled: true
    n_bootstrap: 300
    block_size_events: 1000
    confidence_level: 0.95

random_seed: 42
